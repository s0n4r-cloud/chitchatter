name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git-identiteit en merge-driver instellen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Check op nieuwere versie upstream
        id: check
        run: |
          git remote add upstream https://github.com/jeremyckahn/chitchatter.git
          git fetch upstream main
          BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$UPSTREAM" = "$BASE" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Geen nieuwe versie - niets te doen."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Nieuwe versie gevonden - fork main wordt bijgewerkt."
          fi

      - name: Fork main bijwerken (alleen als er iets nieuws is)
        if: steps.check.outputs.changed == 'true'
        run: |
          git merge upstream/main --no-edit
          git push origin main
